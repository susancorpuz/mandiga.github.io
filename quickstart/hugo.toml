
baseURL = 'https://www.susancorpuz.com/'
# not localhost:1313

# baseURL = 'https://mandiga.github.io/'
languageCode = 'en-us'
title = 'Susan Corpuz'

[pagination]
  pagerSize = 5

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

theme = "PaperMod"

[params]
[params.profileMode]
  enabled = true
  title = "My Portfolio"
  subtitle = "Welcome to my digital space"
  imageUrl = ""
  imageAlt = ""
  [[params.profileMode.buttons]]
    name = "About"
    url = "about"
  [[params.profileMode.buttons]]
    name = "Projects"
    url = "projects"
  [[params.profileMode.buttons]]
    name = "Services"
    url = "services"
  [[params.profileMode.buttons]]
    name = "Fieldnotes"
    url = "fieldnotes"
  [[params.profileMode.buttons]]
    name = "Resume"
    url = "resume"
  [[params.profileMode.buttons]]
    name = "Contact"
    url = "contact"

[params.author]
name = "Susan Corpuz"
email = "me@susancorpuz.com" # RSS needs this

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/susancorpuz"
[[params.socialIcons]]
  name = "linkedin"
  url = "https://linkedin.com/in/susancorpuz"
[[params.socialIcons]]
  name = "instagram"
  url = "https://instagram.com/mandigaworkshop"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[outputs]
  home = ["html"]
  page = ["html"]

